<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <link rel="shortcut icon" href="/favicon.ico">
<style>
/* ── View switch ─────────────────────────────────────────────── */
.view-switch {
  display: flex;
  gap: .375rem;
  margin-bottom: 1.5rem;
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 10px;
  padding: .3rem;
  width: fit-content;
}
.view-switch-btn {
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .45rem 1rem;
  border-radius: 7px;
  border: none;
  background: none;
  color: #666;
  font-family: inherit;
  font-size: .875rem;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.view-switch-btn.active {
  background: #e91e8c;
  color: #fff;
}
.view-switch-btn:not(.active):hover { background: #1a1a1a; color: #ccc; }

/* ── List view: row detail ───────────────────────────────────── */
.row-detail { display: none; }
.row-detail.open { display: table-row; }
.row-detail td { padding: 0 !important; }
.row-detail-inner {
  padding: 1.5rem;
  background: #0d0d0d;
  border-bottom: 2px solid #1e1e1e;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
}
@media(max-width:768px){.row-detail-inner{grid-template-columns:1fr}}

/* ── List view: row actions (wrapping) ───────────────────────── */
.row-actions {
  display: flex;
  flex-wrap: wrap;
  gap: .375rem;
  align-items: center;
}

/* ── Mobile: hide table, show cards ─────────────────────────── */
.booking-card-mobile {
  display: none;
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: .75rem;
  cursor: pointer;
}
.booking-card-mobile__top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.5rem; }
.booking-card-mobile__name { font-weight:600; color:#f5f5f5; font-size:.9375rem; }
.booking-card-mobile__service { font-size:.8rem; color:#888; margin-top:.15rem; }
.booking-card-mobile__meta { display:flex; gap:.75rem; flex-wrap:wrap; font-size:.8rem; color:#888; margin-top:.35rem; }
.booking-card-mobile__actions { display:flex; gap:.5rem; margin-top:.875rem; flex-wrap:wrap; }
@media(max-width:640px) {
  .table-wrap table { display:none; }
  .booking-card-mobile { display:block; }
  .row-detail-inner { padding:1rem; gap:1rem; }
  .edit-grid { grid-template-columns:1fr; }
  .edit-field { grid-column:auto !important; }
}

/* ── Bottom sheet ────────────────────────────────────────────── */
.sheet-overlay { display:none; position:fixed; inset:0; background:#000a; z-index:500; }
.sheet-overlay.open { display:block; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #111;
  border-radius: 16px 16px 0 0;
  z-index: 501;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s ease;
  padding-bottom: env(safe-area-inset-bottom,0);
}
.sheet.open { transform: translateY(0); }
.sheet__handle { width:36px; height:4px; background:#333; border-radius:2px; margin:12px auto 0; }
.sheet__body { padding:1rem 1rem 2rem; }

/* ── Receipt ─────────────────────────────────────────────────── */
.receipt { background:#111; border:1px solid #1e1e1e; border-radius:10px; overflow:hidden; }
.receipt__header { padding:1rem 1.25rem; border-bottom:1px solid #1e1e1e; display:flex; justify-content:space-between; align-items:center; }
.receipt__title { font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:#666; }
.receipt__id { font-size:.7rem; color:#444; font-family:monospace; }
.receipt__section { padding:.875rem 1.25rem; border-bottom:1px solid #1a1a1a; }
.receipt__section:last-child { border-bottom:none; }
.receipt__label { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:#555; margin-bottom:.625rem; }
.receipt__row { display:flex; justify-content:space-between; align-items:baseline; font-size:.875rem; margin-bottom:.35rem; gap:1rem; }
.receipt__row:last-child { margin-bottom:0; }
.receipt__row-label { color:#aaa; }
.receipt__row-val { color:#f5f5f5; text-align:right; }
.receipt__row-val.accent { color:#e91e8c; }
.receipt__row-val.green { color:#4ade80; }
.receipt__row-val.dim { color:#555; font-size:.8rem; }
.receipt__divider { height:1px; background:#1e1e1e; margin:0; }
.receipt__total { padding:1rem 1.25rem; display:flex; justify-content:space-between; align-items:center; }
.receipt__total-label { font-size:.875rem; font-weight:600; color:#f5f5f5; }
.receipt__total-val { font-size:1.25rem; font-weight:700; color:#e91e8c; }
.receipt__badge { display:inline-flex; align-items:center; gap:.3rem; background:#e91e8c1a; color:#e91e8c; border-radius:4px; padding:2px 8px; font-size:.72rem; font-weight:600; }

/* ── Edit form ───────────────────────────────────────────────── */
.edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.edit-field { display:flex; flex-direction:column; gap:.35rem; }
.edit-field label { font-size:.72rem; color:#666; text-transform:uppercase; letter-spacing:.05em; }
.edit-field input, .edit-field select, .edit-field textarea {
  background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px;
  color:#f5f5f5; padding:.5rem .75rem; font-size:.875rem; font-family:inherit;
  width:100%; box-sizing:border-box;
}
.edit-field textarea { resize:vertical; min-height:70px; }
.edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus { outline:none; border-color:#e91e8c; }
.edit-actions { display:flex; gap:.5rem; margin-top:1rem; align-items:center; flex-wrap:wrap; }
.edit-save-msg { font-size:.8rem; color:#4ade80; }

/* ── Invoice badge helper ────────────────────────────────────── */
.inv-badge {
  display: inline-flex;
  align-items: center;
  gap: .2rem;
  font-size: .72rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
  white-space: nowrap;
}
.inv-badge--sent   { background:#e91e8c22; color:#e91e8c; border:1px solid #e91e8c44; }
.inv-badge--viewed { background:#f59e0b22; color:#f59e0b; border:1px solid #f59e0b44; }
.inv-badge--paid   { background:#4ade8022; color:#4ade80; border:1px solid #4ade8044; }

/* ── Toast notification ──────────────────────────────────────── */
.toast {
  position: fixed;
  top: 20px; right: 20px;
  background: #111;
  border: 1px solid #e91e8c;
  border-radius: 10px;
  padding: 1rem 1.25rem;
  z-index: 9999;
  max-width: 360px;
  font-size: .875rem;
  animation: toastIn .2s ease;
}
@keyframes toastIn { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
/* ════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let allBookings   = [];
let currentFilter = 'all';
let searchTerm    = '';
let pageView      = 'list'; // 'list' | 'calendar'

/* Calendar state */
let currentDate  = new Date();
let calViewMode  = 'month'; // 'month' | 'week'
let blockedDates = [];
let activeDayStr = null;

/* ════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
(async () => {
  const profile = await requireAdmin();
  if (!profile) return;

  document.getElementById('userName').textContent   = profile.full_name || 'Admin';
  document.getElementById('userEmail').textContent  = profile.email || '';
  document.getElementById('userAvatar').textContent = (profile.full_name || 'A').charAt(0).toUpperCase();

  /* Check ?view= param */
  const params = new URLSearchParams(window.location.search);
  if (params.get('view') === 'calendar') {
    _applyView('calendar');
  }

  await loadBookings();
})();

/* ════════════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════════ */
async function loadBookings() {
  const [bookingsRes, invoicesRes, blockedRes] = await Promise.all([
    _supabase.from('bookings')
      .select('*, profiles(full_name, phone, email)')
      .order('preferred_date', { ascending: false })
      .order('preferred_time', { ascending: true }),
    _supabase.from('invoices')
      .select('id,booking_id,short_code,status,amount_cents,tip_cents,total_paid_cents,paid_at')
      .order('created_at', { ascending: false }),
    _supabase.from('blocked_dates').select('date'),
  ]);

  allBookings = (bookingsRes.data || []).map(b => ({
    ...b,
    _invoice: (invoicesRes.data || []).find(i => i.booking_id === b.id) || null,
  }));
  blockedDates = (blockedRes.data || []).map(d => d.date);

  if (pageView === 'list') {
    renderTable();
  } else {
    renderCalendar();
  }
}

/* ════════════════════════════════════════════════════════════════
   VIEW SWITCHING
═══════════════════════════════════════════════════════════════ */
function switchView(v) {
  _applyView(v);
  if (v === 'calendar' && allBookings.length > 0) renderCalendar();
  if (v === 'list' && allBookings.length > 0) renderTable();
}

function _applyView(v) {
  pageView = v;
  document.getElementById('listView').style.display     = v === 'list'     ? '' : 'none';
  document.getElementById('calendarView').style.display = v === 'calendar' ? '' : 'none';

  document.getElementById('btnListView').classList.toggle('active',     v === 'list');
  document.getElementById('btnCalendarView').classList.toggle('active', v === 'calendar');

  /* Sidebar active state */
  document.getElementById('navBookings').classList.toggle('active', v === 'list');
  document.getElementById('navCalendar').classList.toggle('active', v === 'calendar');

  /* Tab bar active state */
  document.getElementById('tabBookings').classList.toggle('active', v === 'list');
  document.getElementById('tabCalendar').classList.toggle('active', v === 'calendar');

  /* Page header */
  document.getElementById('pageTitle').textContent = v === 'list' ? 'All Bookings' : 'Calendar';
}

/* ════════════════════════════════════════════════════════════════
   LIST VIEW — FILTER + SEARCH
═══════════════════════════════════════════════════════════════ */
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function onSearch(val) {
  searchTerm = val.toLowerCase().trim();
  renderTable();
}

function getFiltered() {
  const today  = new Date().toISOString().split('T')[0];
  const now    = new Date(); now.setHours(0,0,0,0);
  const wStart = new Date(now); wStart.setDate(now.getDate() - now.getDay());
  const wEnd   = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
  const wStartStr = wStart.toISOString().split('T')[0];
  const wEndStr   = wEnd.toISOString().split('T')[0];

  let list = [...allBookings];
  if      (currentFilter === 'today') list = list.filter(b => b.preferred_date === today);
  else if (currentFilter === 'week')  list = list.filter(b => b.preferred_date >= wStartStr && b.preferred_date <= wEndStr);
  else if (currentFilter !== 'all')   list = list.filter(b => b.status === currentFilter);

  if (searchTerm) {
    list = list.filter(b => {
      const name  = (b.profiles?.full_name || '').toLowerCase();
      const phone = (b.profiles?.phone || '').toLowerCase();
      return name.includes(searchTerm) || phone.includes(searchTerm);
    });
  }
  return list;
}

/* ════════════════════════════════════════════════════════════════
   LIST VIEW — RENDER
═══════════════════════════════════════════════════════════════ */
function invBadgeHTML(inv) {
  if (!inv) return '';
  const cls = inv.status === 'paid' ? 'paid' : inv.status === 'viewed' ? 'viewed' : 'sent';
  const lbl = inv.status === 'paid' ? '✓ Paid' : inv.status === 'viewed' ? '👁 Viewed' : '⬡ Sent';
  return `<span class="inv-badge inv-badge--${cls}">${lbl}</span>`;
}

function rowActionsHTML(b, stopProp = true) {
  const sp = stopProp ? 'event.stopPropagation()' : '';
  const actions = [];
  if (b.status === 'pending')
    actions.push(`<button class="btn btn--primary btn--sm" onclick="updateStatus('${b.id}','confirmed');${sp}">Confirm</button>`);
  if (b.status === 'confirmed')
    actions.push(`<button class="btn btn--primary btn--sm" onclick="updateStatus('${b.id}','completed');${sp}">Complete</button>`);
  if (['pending','confirmed'].includes(b.status))
    actions.push(`<button class="btn btn--ghost btn--sm" onclick="cancelBooking('${b.id}');${sp}">Cancel</button>`);
  if (b.status !== 'cancelled')
    actions.push(`<button class="btn btn--ghost btn--sm" style="color:#e91e8c;border-color:#e91e8c44" onclick="sendInvoice('${b.id}');${sp}">◆ Invoice</button>`);
  actions.push(`<button class="btn btn--ghost btn--sm" onclick="toggleDetail('${b.id}');${sp}">Edit</button>`);
  return actions.join('');
}

/* ── Row toggle (desktop expand) ────────────────────────────── */
function toggleDetail(id) {
  const detail = document.getElementById(`detail-${id}`);
  const wasOpen = detail.classList.contains('open');
  document.querySelectorAll('.row-detail.open').forEach(r => r.classList.remove('open'));
  if (!wasOpen) detail.classList.add('open');
}

/* ── Bottom sheet (mobile) ──────────────────────────────────── */
function openSheet(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;

  const rowActions = [];
  if (b.status === 'pending')
    rowActions.push(`<button class="btn btn--primary" style="width:100%" onclick="updateStatus('${b.id}','confirmed');closeSheet()">Confirm Booking</button>`);
  if (b.status === 'confirmed')
    rowActions.push(`<button class="btn btn--primary" style="width:100%" onclick="updateStatus('${b.id}','completed');closeSheet()">Mark Complete</button>`);
  if (['pending','confirmed'].includes(b.status))
    rowActions.push(`<button class="btn btn--ghost" style="width:100%" onclick="cancelBooking('${b.id}');closeSheet()">Cancel Booking</button>`);
  if (b.status !== 'cancelled')
    rowActions.push(`<button class="btn btn--ghost" style="width:100%;color:#e91e8c;border-color:#e91e8c44" onclick="sendInvoice('${b.id}')">◆ Send Invoice</button>`);

  const name    = clientName(b);
  const email   = clientEmail(b);
  const phone   = clientPhone(b);
  const address = parseNotesField(b.notes,'Address');
  const vehicle = parseNotesField(b.notes,'Vehicle');
  const addons  = parseNotesField(b.notes,'Addons');
  const dep     = (b.deposit_amount||5000)/100;
  const tot     = b.total_amount ? b.total_amount/100 : null;
  const bal     = tot ? Math.max(0,tot-dep) : null;
  const R = (lbl,val,c='') => `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid #1a1a1a;font-size:14px;gap:1rem"><span style="color:#666;flex-shrink:0">${lbl}</span><span style="color:${c==='g'?'#4ade80':c==='p'?'#e91e8c':'#f5f5f5'};text-align:right;word-break:break-word">${val}</span></div>`;
  const SH = t => `<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#555;padding:14px 0 4px;margin-top:4px">${t}</div>`;

  document.getElementById('sheetBody').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem">
      <div>
        <div style="font-size:1.125rem;font-weight:700;color:#f5f5f5">${name}</div>
        <div style="font-size:.8rem;color:#888;margin-top:3px">${b.service_name||''} · ${b.vehicle_type||''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.35rem">
        <span class="badge badge--${b.status}">${b.status}</span>
        ${invBadgeHTML(b._invoice)}
      </div>
    </div>
    ${SH('Client')}${R('Phone',phone)}${R('Email',email)}
    ${SH('Appointment')}${R('Date',formatDate(b.preferred_date))}${R('Time',formatTime(b.preferred_time))}${address&&address!=='—'?R('Address',address):''}
    ${vehicle&&vehicle!=='—'?SH('Vehicle')+R('Details',vehicle)+R('Type',(b.vehicle_type||'').charAt(0).toUpperCase()+(b.vehicle_type||'').slice(1)):''}
    ${SH('Services')}${R(b.service_name||'Service',tot?'$'+tot.toFixed(2):'—')}${addons&&addons!=='—'?addons.split(',').map(a=>`<div style="display:flex;justify-content:space-between;padding:7px 0 7px 12px;font-size:13px;color:#777;border-bottom:1px solid #1a1a1a"><span>+ ${a.trim()}</span><span>Add-on</span></div>`).join(''):''}
    ${SH('Payment')}${tot?R('Service total','$'+tot.toFixed(2)):''}${R('Deposit collected','− $'+dep.toFixed(2)+' ✓','g')}${b.square_payment_id?R('Square ref','…'+b.square_payment_id.slice(-8)):''}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-top:.5rem;border-top:2px solid #1e1e1e">
      <div>
        <div style="font-size:15px;font-weight:700;color:#f5f5f5">Balance Due at Service</div>
        <div style="font-size:11px;color:#444;margin-top:2px">Collected day of appointment</div>
      </div>
      <div style="font-size:22px;font-weight:700;color:#e91e8c">${bal!==null?'$'+bal.toFixed(2):'—'}</div>
    </div>
    ${rowActions.length ? `<div style="display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem">${rowActions.join('')}</div>` : ''}
    <div style="text-align:center;margin-top:.75rem">
      <button class="btn btn--ghost btn--sm" onclick="closeSheet()" style="width:100%">Close</button>
    </div>
  `;

  document.getElementById('sheetOverlay').classList.add('open');
  setTimeout(() => document.getElementById('detailSheet').classList.add('open'), 10);
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('detailSheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ════════════════════════════════════════════════════════════════
   CALENDAR VIEW — RENDER
═══════════════════════════════════════════════════════════════ */
function renderCalendar() {
  updateCalTitle();
  if (calViewMode === 'month') renderMonth();
  else renderWeek();
}

function updateCalTitle() {
  if (calViewMode === 'month') {
    document.getElementById('calTitle').textContent = currentDate.toLocaleDateString('en-US', {
      month: 'long', year: 'numeric'
    });
  } else {
    const ws = weekStart(currentDate);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const opts = { month: 'short', day: 'numeric' };
    document.getElementById('calTitle').textContent =
      ws.toLocaleDateString('en-US', opts) + ' – ' +
      we.toLocaleDateString('en-US', { ...opts, year: 'numeric' });
  }
}

function renderMonth() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  const gridStart = new Date(firstDay); gridStart.setDate(gridStart.getDate() - firstDay.getDay());
  const gridEnd   = new Date(lastDay);  gridEnd.setDate(gridEnd.getDate() + (6 - lastDay.getDay()));
  const today     = new Date(); today.setHours(0,0,0,0);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (let d = new Date(gridStart); d <= gridEnd; d.setDate(d.getDate() + 1)) {
    const dateStr      = toDateStr(d);
    const dayBookings  = allBookings.filter(b => b.preferred_date === dateStr);
    const isToday      = d.getTime() === today.getTime();
    const isOtherMonth = d.getMonth() !== month;
    const isBlocked    = blockedDates.includes(dateStr);

    const cell = document.createElement('div');
    cell.className = 'cal-cell' +
      (isToday      ? ' cal-cell--today'       : '') +
      (isOtherMonth ? ' cal-cell--other-month'  : '') +
      (isBlocked    ? ' cal-cell--blocked'      : '');

    const pills = dayBookings.slice(0,3).map(b => {
      const active = ['pending','confirmed'].includes(b.status);
      return `<div class="booking-pill booking-pill--${active?'active':'gray'}">${b.profiles?.full_name || 'Client'}</div>`;
    }).join('');
    const more = dayBookings.length > 3 ? `<div class="cal-cell__more">+${dayBookings.length - 3} more</div>` : '';
    const countBadge = dayBookings.length > 0
      ? `<span style="font-size:.6rem;color:var(--clr-muted-2);font-weight:400">${dayBookings.length}</span>` : '';

    cell.innerHTML = `
      <div class="cal-cell__num"><span>${d.getDate()}</span>${countBadge}</div>
      <div class="cal-cell__pills">${pills}${more}</div>
    `;
    const ds = dateStr;
    cell.addEventListener('click', () => openDayPanel(ds));
    grid.appendChild(cell);
  }

  document.getElementById('monthView').style.display = '';
  document.getElementById('weekView').style.display  = 'none';
}

function renderWeek() {
  const ws      = weekStart(currentDate);
  const today   = new Date(); today.setHours(0,0,0,0);
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const days    = Array.from({ length:7 }, (_,i) => { const d = new Date(ws); d.setDate(d.getDate()+i); return d; });

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  /* Corner */
  const corner = document.createElement('div');
  corner.className = 'week-corner';
  grid.appendChild(corner);

  /* Day headers */
  days.forEach(d => {
    const isToday = d.getTime() === today.getTime();
    const h = document.createElement('div');
    h.className = 'week-col-header' + (isToday ? ' week-col-header--today' : '');
    h.innerHTML = `<div class="week-col-header__day">${DAY_NAMES[d.getDay()]}</div><div class="week-col-header__date">${d.getDate()}</div>`;
    grid.appendChild(h);
  });

  /* Time rows 8am–5pm */
  for (let h = 8; h <= 17; h++) {
    const label = document.createElement('div');
    label.className = 'week-time-label';
    label.textContent = h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
    grid.appendChild(label);

    days.forEach(d => {
      const dateStr     = toDateStr(d);
      const slotBookings = allBookings.filter(b => {
        if (b.preferred_date !== dateStr || !b.preferred_time) return false;
        return parseInt(b.preferred_time.split(':')[0]) === h;
      });

      const slot = document.createElement('div');
      slot.className = 'week-slot';

      slotBookings.forEach(b => {
        const active = ['pending','confirmed'].includes(b.status);
        const block  = document.createElement('div');
        block.className = 'week-booking-block' + (active ? '' : ' week-booking-block--gray');
        block.innerHTML = `<strong>${b.profiles?.full_name || 'Client'}</strong><br>${b.service_name || ''}`;
        block.addEventListener('click', e => { e.stopPropagation(); openBookingModal(b); });
        slot.appendChild(block);
      });

      grid.appendChild(slot);
    });
  }

  document.getElementById('monthView').style.display = 'none';
  document.getElementById('weekView').style.display  = '';
}

/* ── Day panel ──────────────────────────────────────────────── */
function openDayPanel(dateStr) {
  activeDayStr = dateStr;
  const date = new Date(dateStr + 'T00:00:00');
  const dayBookings = allBookings
    .filter(b => b.preferred_date === dateStr)
    .sort((a,b) => (a.preferred_time||'').localeCompare(b.preferred_time||''));

  document.getElementById('dayPanelDate').textContent = date.toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric', year:'numeric'
  });

  const body = document.getElementById('dayPanelBody');
  if (dayBookings.length === 0) {
    body.innerHTML = `
      <div class="empty-state" style="padding:2rem 1rem">
        <div class="empty-state__title">No bookings</div>
        <div class="empty-state__sub">No appointments scheduled for this day</div>
      </div>`;
  } else {
    body.innerHTML = dayBookings.map(renderCalDetailCard).join('');
  }

  document.getElementById('dayPanel').classList.add('open');
  document.getElementById('dayOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDayPanel() {
  activeDayStr = null;
  document.getElementById('dayPanel').classList.remove('open');
  document.getElementById('dayOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCalReceiptHTML(b) {
  const name    = clientName(b);
  const email   = clientEmail(b);
  const phone   = clientPhone(b);
  const address = parseNotesField(b.notes,'Address');
  const vehicle = parseNotesField(b.notes,'Vehicle');
  const addons  = parseNotesField(b.notes,'Addons');
  const dep     = (b.deposit_amount||5000)/100;
  const tot     = b.total_amount ? b.total_amount/100 : null;
  const bal     = tot ? Math.max(0,tot-dep) : null;
  const R = (label, val, cls='') => `<div style="display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #1a1a1a;font-size:13px"><span style="color:#666">${label}</span><span style="color:${cls==='green'?'#4ade80':cls==='pink'?'#e91e8c':'#f5f5f5'};text-align:right;max-width:60%">${val}</span></div>`;
  const SH = title => `<div style="padding:8px 16px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#444;border-bottom:1px solid #1a1a1a">${title}</div>`;
  return `
    <div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #1e1e1e;background:#111">
        <div style="display:flex;align-items:center;gap:.5rem">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#555">◆ Receipt #${b.id.slice(-6).toUpperCase()}</div>
          ${invBadgeHTML(b._invoice)}
        </div>
        <span class="badge badge--${b.status}">${b.status}</span>
      </div>
      ${SH('Client')}${R('Name',name)}${R('Phone',phone)}${R('Email',email)}
      ${SH('Appointment')}${R('Date',formatDate(b.preferred_date))}${R('Time',formatTime(b.preferred_time))}${address&&address!=='—'?R('Address',address):''}
      ${vehicle&&vehicle!=='—'?SH('Vehicle')+R('Details',vehicle)+R('Type',(b.vehicle_type||'').charAt(0).toUpperCase()+(b.vehicle_type||'').slice(1)):''}
      ${SH('Services')}${R(b.service_name||'Detail Service',tot?'$'+tot.toFixed(2):'—')}${addons&&addons!=='—'?addons.split(',').map(a=>`<div style="display:flex;justify-content:space-between;padding:7px 16px 7px 28px;font-size:12px;color:#666;border-bottom:1px solid #1a1a1a"><span>+ ${a.trim()}</span><span>Add-on</span></div>`).join(''):''}
      ${SH('Payment')}${tot?R('Service total','$'+tot.toFixed(2)):''}${R('Deposit paid','− $'+dep.toFixed(2)+' ✓','green')}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#0a0a0a">
        <div>
          <div style="font-size:14px;font-weight:600;color:#f5f5f5">Balance Due at Service</div>
          <div style="font-size:11px;color:#444;margin-top:2px">Collected day of appointment</div>
        </div>
        <div style="font-size:20px;font-weight:700;color:#e91e8c">${bal!==null?'$'+bal.toFixed(2):'—'}</div>
      </div>
    </div>`;
}

function renderCalDetailCard(b) {
  const actionBtns = [];
  if (b.status === 'pending') {
    actionBtns.push(`<button onclick="updateStatus('${b.id}','confirmed')" class="btn btn--primary btn--sm">Confirm</button>`);
    actionBtns.push(`<button onclick="cancelBooking('${b.id}')" class="btn btn--ghost btn--sm">Cancel</button>`);
  } else if (b.status === 'confirmed') {
    actionBtns.push(`<button onclick="updateStatus('${b.id}','completed')" class="btn btn--primary btn--sm">Complete</button>`);
    actionBtns.push(`<button onclick="cancelBooking('${b.id}')" class="btn btn--ghost btn--sm">Cancel</button>`);
  } else {
    actionBtns.push(`<span class="badge badge--${b.status}">${b.status}</span>`);
  }
  if (b.status !== 'cancelled') {
    actionBtns.push(`<button onclick="sendInvoice('${b.id}');event.stopPropagation()" style="background:none;border:1px solid #e91e8c44;border-radius:6px;color:#e91e8c;padding:.4rem .875rem;font-size:.8rem;cursor:pointer;font-family:inherit">◆ Send Invoice</button>`);
  }
  return `<div class="booking-detail-card" style="padding:0;background:transparent;border:none">${renderCalReceiptHTML(b)}<div style="display:flex;gap:.5rem;flex-wrap:wrap;padding:.5rem 0 .25rem">${actionBtns.join('')}</div></div>`;
}

/* ── Booking modal (week view) ──────────────────────────────── */
function openBookingModal(b) {
  const actionBtns = [];
  if (b.status === 'pending') {
    actionBtns.push(`<button onclick="updateStatus('${b.id}','confirmed');closeModal()" class="btn btn--primary btn--sm">Confirm</button>`);
    actionBtns.push(`<button onclick="cancelBooking('${b.id}');closeModal()" class="btn btn--ghost btn--sm">Cancel</button>`);
  } else if (b.status === 'confirmed') {
    actionBtns.push(`<button onclick="updateStatus('${b.id}','completed');closeModal()" class="btn btn--primary btn--sm">Complete</button>`);
    actionBtns.push(`<button onclick="cancelBooking('${b.id}');closeModal()" class="btn btn--ghost btn--sm">Cancel</button>`);
  } else {
    actionBtns.push(`<span class="badge badge--${b.status}">${b.status}</span>`);
  }
  if (b.status !== 'cancelled') {
    actionBtns.push(`<button onclick="sendInvoice('${b.id}')" style="background:none;border:1px solid #e91e8c44;border-radius:6px;color:#e91e8c;padding:.5rem 1rem;font-size:.875rem;cursor:pointer;font-family:inherit">◆ Send Invoice</button>`);
  }

  document.getElementById('modalContent').innerHTML = `
    <div class="modal__head">
      <div class="modal__title">${b.profiles?.full_name || 'Client'}</div>
      <button class="modal__close" onclick="closeModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" style="padding:1rem">${renderCalReceiptHTML(b)}</div>
    <div class="modal__actions" style="display:flex;gap:.5rem;flex-wrap:wrap">${actionBtns.join('')}</div>
  `;
  document.getElementById('bookingModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('bookingModal')) return;
  document.getElementById('bookingModal').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── Calendar nav ───────────────────────────────────────────── */
document.getElementById('prevBtn').addEventListener('click', () => {
  if (calViewMode === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
  else currentDate.setDate(currentDate.getDate() - 7);
  renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (calViewMode === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
  else currentDate.setDate(currentDate.getDate() + 7);
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = new Date();
  renderCalendar();
});
document.getElementById('monthBtn').addEventListener('click', () => {
  calViewMode = 'month';
  document.getElementById('monthBtn').classList.add('active');
  document.getElementById('weekBtn').classList.remove('active');
  renderCalendar();
});
document.getElementById('weekBtn').addEventListener('click', () => {
  calViewMode = 'week';
  document.getElementById('weekBtn').classList.add('active');
  document.getElementById('monthBtn').classList.remove('active');
  renderCalendar();
});
document.getElementById('dayOverlay').addEventListener('click', closeDayPanel);
document.getElementById('dayPanelClose').addEventListener('click', closeDayPanel);
document.getElementById('bookingModal').addEventListener('click', closeModal);

/* ════════════════════════════════════════════════════════════════
   SHARED ACTIONS
═══════════════════════════════════════════════════════════════ */
async function sendInvoice(id) {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { alert('Not logged in'); return; }

  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  try {
    const res = await fetch('https://fjafmptbzydqizafuaru.supabase.co/functions/v1/process-invoice', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ action: 'create', bookingId: id, adminToken: session.access_token }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Failed to create invoice');

    if (btn) { btn.textContent = '✓ Invoice Sent'; btn.style.color = '#4ade80'; }

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <div style="color:#e91e8c;font-weight:600;margin-bottom:.5rem">Invoice Sent ✓</div>
      <div style="color:#aaa;margin-bottom:.75rem;font-size:.8rem">Client has been emailed the payment link.</div>
      <a href="${data.invoiceUrl}" target="_blank" style="color:#e91e8c;word-break:break-all;font-size:.78rem">${data.invoiceUrl}</a>
      <div style="margin-top:.75rem">
        <button onclick="this.closest('.toast').remove()" style="background:none;border:1px solid #333;border-radius:6px;color:#888;padding:4px 12px;cursor:pointer;font-size:.8rem">Dismiss</button>
      </div>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 12000);

    await loadBookings();
  } catch(err) {
    alert('Error: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

async function updateStatus(id, status) {
  await _supabase.from('bookings').update({ status }).eq('id', id);
  await loadBookings();
  if (activeDayStr) openDayPanel(activeDayStr);
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking?')) return;
  await updateStatus(id, 'cancelled');
}

async function saveEdit(id) {
  const get = field => document.getElementById(`ef-${field}-${id}`)?.value;
  const totalDollars = parseFloat(get('total'));
  const updates = {
    service_name:   get('service'),
    vehicle_type:   get('vtype'),
    preferred_date: get('date') || null,
    preferred_time: get('time') || null,
    status:         get('status'),
    notes:          get('notes'),
    admin_notes:    get('adminnotes'),
    total_amount:   isNaN(totalDollars) ? null : Math.round(totalDollars * 100),
  };
  const msgEl = document.getElementById(`ef-msg-${id}`);
  const { error } = await _supabase.from('bookings').update(updates).eq('id', id);
  if (error) {
    msgEl.textContent = 'Error saving!';
    msgEl.style.color = '#e91e8c';
  } else {
    msgEl.textContent = 'Saved ✓';
    msgEl.style.color = '#4ade80';
    setTimeout(() => { msgEl.textContent = ''; }, 2000);
    await loadBookings();
  }
}

/* ════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function parseNotesField(notes, key) {
  if (!notes) return '—';
  const parts = notes.split('|').map(p => p.trim());
  const match = parts.find(p => p.startsWith(key + ':'));
  return match ? match.replace(key + ':', '').trim() : '—';
}
function clientName(b)  { return b.profiles?.full_name || parseNotesField(b.notes,'Customer') || '—'; }
function clientEmail(b) { return b.profiles?.email      || parseNotesField(b.notes,'Email')    || '—'; }
function clientPhone(b) { return b.profiles?.phone      || parseNotesField(b.notes,'Phone')    || '—'; }

function toDateStr(d) { return d.toISOString().split('T')[0]; }

function weekStart(d) {
  const ws = new Date(d);
  ws.setDate(ws.getDate() - ws.getDay());
  ws.setHours(0,0,0,0);
  return ws;
}

function formatTime(t) {
  if (!t) return '—';
  const [h, m] = t.split(':');
  const hour = parseInt(h);
  return `${hour > 12 ? hour - 12 : hour || 12}:${m} ${hour >= 12 ? 'PM' : 'AM'}`;
}

/* formatDate may already be provided by auth.js / supabase-config.js;
   define a fallback so it always works */
if (typeof formatDate === 'undefined') {
  window.formatDate = function(d) {
    if (!d) return '—';
    const [y, mo, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(mo)-1]} ${parseInt(day)}, ${y}`;
  };
}
