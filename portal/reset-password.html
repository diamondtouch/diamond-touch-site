<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Diamond Touch Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/portal.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/">
        <img src="../assets/logo-horizontal.png" alt="Diamond Touch Detailing" />
      </a>
    </div>

    <div class="auth-box">
      <h1 class="auth-heading">Reset your password</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

      <div class="alert alert--error" id="errorMsg" role="alert"></div>
      <div class="alert alert--success" id="successMsg" role="status"></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
          Send Reset Link
        </button>
      </form>
    </div>

    <p class="auth-footer">
      <a href="login.html">Back to sign in</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
(async () => {
  const form = document.getElementById('resetForm');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');

    const email = form.email.value.trim();

    if (!email) {
      errorMsg.textContent = 'Please enter your email address.';
      errorMsg.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>';

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/portal/login.html'
    });

    if (error) {
      errorMsg.textContent = error.message || 'Failed to send reset link. Please try again.';
      errorMsg.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
      return;
    }

    successMsg.textContent = 'Reset link sent! Check your email inbox.';
    successMsg.classList.add('visible');
    form.style.display = 'none';
  });
})();
</script>

</body>
</html>
