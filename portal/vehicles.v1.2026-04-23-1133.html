<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Vehicles — Diamond Touch Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>

<div class="portal-layout">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="/"><img src="../assets/logo-horizontal.png" alt="Diamond Touch Detailing" /></a>
    </div>
    <nav class="sidebar__nav" aria-label="Portal navigation">
      <a href="dashboard.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="bookings.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        My Bookings
      </a>
      <a href="vehicles.html" class="sidebar__link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h10l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
        My Vehicles
      </a>
      <a href="membership.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Membership
      </a>
      <a href="account.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Account
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="userAvatar">—</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" id="userName">Loading...</div>
          <div class="sidebar__user-email" id="userEmail"></div>
        </div>
      </div>
      <button class="btn-signout" onclick="signOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- ========== MAIN ========== -->
  <main class="portal-main">
    <div class="portal-main__inner">

      <div class="page-header">
        <p class="page-header__eyebrow">Client Portal</p>
        <h1 class="page-header__title">My Vehicles</h1>
        <p class="page-header__sub">Manage your saved vehicles to speed up booking.</p>
      </div>

      <!-- ADD VEHICLE FORM -->
      <div class="section-card" id="addVehicleSection">
        <h2 class="section-card__title">Add a Vehicle</h2>

        <div class="inline-alert" id="addAlert"></div>

        <form id="addVehicleForm" novalidate>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="addYear">Year</label>
              <input class="form-input" type="text" id="addYear" name="year" placeholder="2021" maxlength="4" />
            </div>
            <div class="form-group">
              <label class="form-label" for="addMake">Make</label>
              <input class="form-input" type="text" id="addMake" name="make" placeholder="Honda" />
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="addModel">Model</label>
              <input class="form-input" type="text" id="addModel" name="model" placeholder="Accord" />
            </div>
            <div class="form-group">
              <label class="form-label" for="addColor">Color</label>
              <input class="form-input" type="text" id="addColor" name="color" placeholder="Silver" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <div class="type-toggle-group" id="addTypeGroup">
              <button type="button" class="type-toggle-btn active" data-value="Sedan">Sedan</button>
              <button type="button" class="type-toggle-btn" data-value="SUV">SUV</button>
              <button type="button" class="type-toggle-btn" data-value="Truck">Truck</button>
            </div>
            <input type="hidden" id="addType" value="Sedan" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addNotes">Notes <span style="color:var(--clr-muted-2);font-weight:400">(optional)</span></label>
            <textarea class="form-input" id="addNotes" name="notes" placeholder="e.g. leather interior, needs extra care on rims" rows="2" style="resize:vertical"></textarea>
          </div>
          <button type="submit" class="btn btn--primary" id="addVehicleBtn">
            <span id="addBtnText">Save Vehicle</span>
            <span class="spinner" id="addSpinner" style="display:none"></span>
          </button>
        </form>
      </div>

      <!-- VEHICLE LIST -->
      <h2 class="section-heading" style="margin-top:2rem">Saved Vehicles</h2>
      <div id="vehicleList">
        <div class="loading-row">Loading...</div>
      </div>

    </div>
  </main>

</div>

<!-- ========== MOBILE TAB BAR ========== -->
<nav class="tab-bar" aria-label="Mobile navigation">
  <div class="tab-bar__inner">
    <a href="dashboard.html" class="tab-bar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Home
    </a>
    <a href="bookings.html" class="tab-bar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Bookings
    </a>
    <a href="vehicles.html" class="tab-bar__item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h10l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
      Vehicles
    </a>
    <a href="membership.html" class="tab-bar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Member
    </a>
    <a href="account.html" class="tab-bar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Account
    </a>
  </div>
</nav>

<!-- ========== DELETE CONFIRM DIALOG ========== -->
<div class="modal-overlay" id="deleteOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal__head">
      <h2 class="modal__title">Remove Vehicle</h2>
      <button class="modal__close" id="deleteDialogClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <p style="font-size:0.9375rem;color:var(--clr-muted);line-height:1.6">Remove <strong id="deleteVehicleName" style="color:var(--clr-text)"></strong> from your saved vehicles?</p>
    </div>
    <div class="modal__actions">
      <button class="btn btn--ghost btn--sm" id="deleteDialogNo">Cancel</button>
      <button class="btn btn--danger btn--sm" id="deleteDialogYes">
        <span id="deleteBtnText">Remove</span>
        <span class="spinner" id="deleteSpinner" style="display:none"></span>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
(async () => {
  const session = await requireAuth('../portal/login.html');
  if (!session) return;

  const profile = await getUserProfile();
  if (!profile) return;

  // Sidebar
  document.getElementById('userName').textContent = profile.full_name || 'Client';
  document.getElementById('userEmail').textContent = session.user.email || '';
  document.getElementById('userAvatar').textContent = (profile.full_name || 'C').charAt(0).toUpperCase();

  // ── State ──────────────────────────────────────────────────
  let vehicles = [];
  let editingId = null;
  let deleteTargetId = null;

  // ── Type toggle for Add form ───────────────────────────────
  document.getElementById('addTypeGroup').addEventListener('click', (e) => {
    const btn = e.target.closest('.type-toggle-btn');
    if (!btn) return;
    document.querySelectorAll('#addTypeGroup .type-toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('addType').value = btn.dataset.value;
  });

  // ── Render vehicles ────────────────────────────────────────
  function renderVehicles() {
    const el = document.getElementById('vehicleList');
    if (vehicles.length === 0) {
      el.innerHTML = `
        <div class="booking-empty-state" style="border:1px solid var(--clr-border);border-radius:var(--radius-lg)">
          <div class="empty-state__icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h10l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          </div>
          <div class="empty-state__title">No vehicles saved</div>
          <div class="empty-state__sub">Add your first vehicle above</div>
        </div>`;
      return;
    }

    el.innerHTML = vehicles.map(v => {
      const name = [v.year, v.make, v.model].filter(Boolean).join(' ') || 'Vehicle';
      const isEditing = editingId === v.id;

      return `
        <div class="vehicle-card" id="vcard-${v.id}">
          ${isEditing ? `
          <!-- EDIT FORM -->
          <div class="vehicle-card__edit">
            <div class="inline-alert" id="editAlert-${v.id}"></div>
            <div class="form-row-2">
              <div class="form-group" style="margin-bottom:0.875rem">
                <label class="form-label">Year</label>
                <input class="form-input" type="text" id="editYear-${v.id}" value="${v.year || ''}" maxlength="4" />
              </div>
              <div class="form-group" style="margin-bottom:0.875rem">
                <label class="form-label">Make</label>
                <input class="form-input" type="text" id="editMake-${v.id}" value="${v.make || ''}" />
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group" style="margin-bottom:0.875rem">
                <label class="form-label">Model</label>
                <input class="form-input" type="text" id="editModel-${v.id}" value="${v.model || ''}" />
              </div>
              <div class="form-group" style="margin-bottom:0.875rem">
                <label class="form-label">Color</label>
                <input class="form-input" type="text" id="editColor-${v.id}" value="${v.color || ''}" />
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0.875rem">
              <label class="form-label">Type</label>
              <div class="type-toggle-group" id="editTypeGroup-${v.id}">
                <button type="button" class="type-toggle-btn ${v.type === 'Sedan' ? 'active' : ''}" data-value="Sedan">Sedan</button>
                <button type="button" class="type-toggle-btn ${v.type === 'SUV' ? 'active' : ''}" data-value="SUV">SUV</button>
                <button type="button" class="type-toggle-btn ${v.type === 'Truck' ? 'active' : ''}" data-value="Truck">Truck</button>
              </div>
              <input type="hidden" id="editType-${v.id}" value="${v.type || 'Sedan'}" />
            </div>
            <div class="form-group" style="margin-bottom:1rem">
              <label class="form-label">Notes</label>
              <textarea class="form-input" id="editNotes-${v.id}" rows="2" style="resize:vertical">${v.notes || ''}</textarea>
            </div>
            <div style="display:flex;gap:0.5rem">
              <button class="btn btn--primary btn--sm save-edit-btn" data-id="${v.id}">
                <span class="save-btn-text">Save Changes</span>
                <span class="spinner save-spinner" style="display:none"></span>
              </button>
              <button class="btn btn--ghost btn--sm cancel-edit-btn" data-id="${v.id}">Cancel</button>
            </div>
          </div>
          ` : `
          <!-- VIEW MODE -->
          <div class="vehicle-card__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h10l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          </div>
          <div class="vehicle-card__info">
            <div class="vehicle-card__name">${name}</div>
            <div class="vehicle-card__meta">
              ${v.color ? `<span>${v.color}</span>` : ''}
              ${v.type ? `<span class="badge badge--vehicle-type">${v.type}</span>` : ''}
            </div>
            ${v.notes ? `<div class="vehicle-card__notes">${v.notes}</div>` : ''}
          </div>
          <div class="vehicle-card__actions">
            <button class="btn btn--ghost btn--sm edit-btn" data-id="${v.id}">Edit</button>
            <button class="btn btn--ghost btn--sm delete-btn" data-id="${v.id}" data-name="${name}" style="color:#fca5a5;border-color:rgba(239,68,68,0.3)">Delete</button>
          </div>
          `}
        </div>`;
    }).join('');

    // Bind edit type toggles
    vehicles.forEach(v => {
      if (editingId === v.id) {
        const grp = document.getElementById(`editTypeGroup-${v.id}`);
        if (grp) {
          grp.addEventListener('click', (e) => {
            const btn = e.target.closest('.type-toggle-btn');
            if (!btn) return;
            grp.querySelectorAll('.type-toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`editType-${v.id}`).value = btn.dataset.value;
          });
        }
      }
    });
  }

  // ── Load vehicles ──────────────────────────────────────────
  async function loadVehicles() {
    const { data, error } = await _supabase
      .from('vehicles')
      .select('*')
      .eq('user_id', profile.id)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('vehicleList').innerHTML = `<p style="color:var(--clr-muted)">Failed to load vehicles.</p>`;
      return;
    }
    vehicles = data || [];
    renderVehicles();
  }

  await loadVehicles();

  // ── Add vehicle form ───────────────────────────────────────
  const addAlert = document.getElementById('addAlert');

  document.getElementById('addVehicleForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    addAlert.className = 'inline-alert';
    addAlert.textContent = '';

    const year  = document.getElementById('addYear').value.trim();
    const make  = document.getElementById('addMake').value.trim();
    const model = document.getElementById('addModel').value.trim();

    if (!make && !model) {
      addAlert.textContent = 'Please enter at least a Make and Model.';
      addAlert.className = 'inline-alert inline-alert--error visible';
      return;
    }

    const btn = document.getElementById('addVehicleBtn');
    document.getElementById('addBtnText').style.display = 'none';
    document.getElementById('addSpinner').style.display = 'inline-block';
    btn.disabled = true;

    const { error: insertError } = await _supabase.from('vehicles').insert({
      user_id: profile.id,
      year:  year  || null,
      make:  make  || null,
      model: model || null,
      color: document.getElementById('addColor').value.trim() || null,
      type:  document.getElementById('addType').value,
      notes: document.getElementById('addNotes').value.trim() || null,
    });

    document.getElementById('addBtnText').style.display = '';
    document.getElementById('addSpinner').style.display = 'none';
    btn.disabled = false;

    if (insertError) {
      addAlert.textContent = 'Failed to save vehicle. Please try again.';
      addAlert.className = 'inline-alert inline-alert--error visible';
      return;
    }

    // Reset form
    document.getElementById('addVehicleForm').reset();
    document.querySelectorAll('#addTypeGroup .type-toggle-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#addTypeGroup [data-value="Sedan"]').classList.add('active');
    document.getElementById('addType').value = 'Sedan';

    addAlert.textContent = 'Vehicle saved successfully.';
    addAlert.className = 'inline-alert inline-alert--success visible';
    setTimeout(() => addAlert.className = 'inline-alert', 3000);

    await loadVehicles();
  });

  // ── Delegate edit / delete / save / cancel ─────────────────
  document.addEventListener('click', async (e) => {
    // Open edit
    const editBtn = e.target.closest('.edit-btn');
    if (editBtn) {
      editingId = editBtn.dataset.id;
      renderVehicles();
      return;
    }

    // Cancel edit
    const cancelEditBtn = e.target.closest('.cancel-edit-btn');
    if (cancelEditBtn) {
      editingId = null;
      renderVehicles();
      return;
    }

    // Save edit
    const saveBtn = e.target.closest('.save-edit-btn');
    if (saveBtn) {
      const id = saveBtn.dataset.id;
      const alertEl = document.getElementById(`editAlert-${id}`);
      if (alertEl) { alertEl.className = 'inline-alert'; alertEl.textContent = ''; }

      saveBtn.querySelector('.save-btn-text').style.display = 'none';
      saveBtn.querySelector('.save-spinner').style.display = 'inline-block';
      saveBtn.disabled = true;

      const { error: updateErr } = await _supabase.from('vehicles').update({
        year:  document.getElementById(`editYear-${id}`).value.trim() || null,
        make:  document.getElementById(`editMake-${id}`).value.trim() || null,
        model: document.getElementById(`editModel-${id}`).value.trim() || null,
        color: document.getElementById(`editColor-${id}`).value.trim() || null,
        type:  document.getElementById(`editType-${id}`).value,
        notes: document.getElementById(`editNotes-${id}`).value.trim() || null,
      }).eq('id', id).eq('user_id', profile.id);

      if (updateErr) {
        saveBtn.querySelector('.save-btn-text').style.display = '';
        saveBtn.querySelector('.save-spinner').style.display = 'none';
        saveBtn.disabled = false;
        if (alertEl) {
          alertEl.textContent = 'Failed to save changes.';
          alertEl.className = 'inline-alert inline-alert--error visible';
        }
        return;
      }

      editingId = null;
      await loadVehicles();
      return;
    }

    // Delete
    const deleteBtn = e.target.closest('.delete-btn');
    if (deleteBtn) {
      deleteTargetId = deleteBtn.dataset.id;
      document.getElementById('deleteVehicleName').textContent = deleteBtn.dataset.name;
      document.getElementById('deleteOverlay').classList.add('open');
      return;
    }
  });

  // ── Delete dialog ──────────────────────────────────────────
  function closeDeleteDialog() {
    document.getElementById('deleteOverlay').classList.remove('open');
    deleteTargetId = null;
  }

  document.getElementById('deleteDialogClose').addEventListener('click', closeDeleteDialog);
  document.getElementById('deleteDialogNo').addEventListener('click', closeDeleteDialog);
  document.getElementById('deleteOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('deleteOverlay')) closeDeleteDialog();
  });

  document.getElementById('deleteDialogYes').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    document.getElementById('deleteBtnText').style.display = 'none';
    document.getElementById('deleteSpinner').style.display = 'inline-block';
    document.getElementById('deleteDialogYes').disabled = true;

    const { error: delError } = await _supabase
      .from('vehicles')
      .delete()
      .eq('id', deleteTargetId)
      .eq('user_id', profile.id);

    document.getElementById('deleteBtnText').style.display = '';
    document.getElementById('deleteSpinner').style.display = 'none';
    document.getElementById('deleteDialogYes').disabled = false;
    closeDeleteDialog();

    if (!delError) await loadVehicles();
  });
})();
</script>

</body>
</html>
