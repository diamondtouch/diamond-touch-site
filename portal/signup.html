<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Diamond Touch Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/">
        <img src="../assets/logo-horizontal.png" alt="Diamond Touch Detailing" />
      </a>
    </div>

    <div class="auth-box">
      <h1 class="auth-heading">Create your account</h1>
      <p class="auth-sub">Join to manage bookings, track service history, and more.</p>

      <div class="alert alert--error" id="errorMsg" role="alert"></div>
      <div class="alert alert--success" id="successMsg" role="status"></div>

      <form id="signupForm" novalidate>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="form-group">
            <label class="form-label" for="firstName">First name</label>
            <input class="form-input" type="text" id="firstName" name="firstName" placeholder="Jane" required autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last name</label>
            <input class="form-input" type="text" id="lastName" name="lastName" placeholder="Smith" required autocomplete="family-name" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone number</label>
          <input class="form-input" type="tel" id="phone" name="phone" placeholder="(555) 000-0000" autocomplete="tel" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password" minlength="8" style="padding-right:2.5rem" />
            <button type="button" onclick="togglePw('password',this)" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#666;padding:0;line-height:1" tabindex="-1" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required autocomplete="new-password" style="padding-right:2.5rem" />
            <button type="button" onclick="togglePw('confirmPassword',this)" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#666;padding:0;line-height:1" tabindex="-1" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Marketing consent -->
        <div style="margin:.75rem 0;display:flex;flex-direction:column;gap:.625rem">
          <label style="display:flex;align-items:flex-start;gap:.625rem;cursor:pointer;font-size:.8rem;color:#888">
            <input type="checkbox" id="emailConsent" checked style="margin-top:2px;accent-color:#e91e8c;flex-shrink:0" />
            <span>I agree to receive booking confirmations, appointment reminders, and promotional emails from Diamond Touch Detailing.</span>
          </label>
          <label style="display:flex;align-items:flex-start;gap:.625rem;cursor:pointer;font-size:.8rem;color:#888">
            <input type="checkbox" id="smsConsent" checked style="margin-top:2px;accent-color:#e91e8c;flex-shrink:0" />
            <span>I agree to receive SMS/text notifications and offers from Diamond Touch Detailing. Message &amp; data rates may apply. Reply STOP to opt out.</span>
          </label>
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
          Create Account
        </button>
      </form>
    </div>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
(async () => {
  const form = document.getElementById('signupForm');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    successMsg.classList.remove('visible');
  }

  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.classList.add('visible');
    errorMsg.classList.remove('visible');
    form.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const fullName  = [firstName, lastName].filter(Boolean).join(' ');
    const email = form.email.value.trim();
    const phone = form.phone.value.trim();
    const params = new URLSearchParams(window.location.search);
    const redirectParam = params.get('redirect') ? `?redirect=${encodeURIComponent(params.get('redirect'))}` : '';
    const password = form.password.value;
    const confirmPassword = form.confirmPassword.value;

    if (!firstName || !email || !password) {
      showError('Please fill in all required fields.');
      return;
    }

    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    if (password !== confirmPassword) {
      showError('Passwords do not match.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>';

    const emailConsent = document.getElementById('emailConsent')?.checked ?? true;
    const smsConsent   = document.getElementById('smsConsent')?.checked ?? true;

    const redirectUrl = 'https://diamondtouchdetails.com/portal/confirmed.html' + redirectParam;
    const { data: signUpData, error } = await _supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName, phone },
        emailRedirectTo: redirectUrl,
      }
    });

    if (error) {
      showError(error.message || 'Sign up failed. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
      return;
    }

    // Save marketing consent + phone to profile (fire and forget — don't await)
    if (signUpData?.user?.id) {
      _supabase.from('profiles').update({
        phone,
        email_marketing:      emailConsent,
        sms_marketing:        smsConsent,
        marketing_consent_at: new Date().toISOString(),
      }).eq('id', signUpData.user.id).then(() => {}).catch(() => {});
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';

    // Show email verification screen
    form.closest('.auth-card').innerHTML = `
      <div style="text-align:center;padding:1rem 0">
        <div style="width:64px;height:64px;background:#e91e8c1a;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:28px;line-height:64px">✉️</div>
        <h2 style="color:#f5f5f5;font-size:1.375rem;margin:0 0 12px">Check your email</h2>
        <p style="color:#888;font-size:.9375rem;line-height:1.6;margin:0 0 8px">We sent a confirmation link to</p>
        <p style="color:#e91e8c;font-weight:600;margin:0 0 24px;font-size:1rem">${email}</p>
        <p style="color:#666;font-size:.875rem;line-height:1.6;margin:0 0 28px">Click the link in the email to verify your account, then you can sign in. Check your spam folder if you don't see it.</p>
        <a href="login.html${redirectParam}" style="display:inline-block;background:#e91e8c;color:#fff;text-decoration:none;padding:13px 32px;border-radius:6px;font-size:.9375rem;font-weight:600">Go to Sign In →</a>
        <p style="margin:20px 0 0;font-size:.8rem;color:#555">Wrong email? <a href="signup.html" style="color:#e91e8c">Sign up again</a></p>
      </div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.style.color = isHidden ? '#e91e8c' : '#666';
  btn.querySelector('svg').innerHTML = isHidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
</script>
</body>
</html>
